<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Fonts : Lora pour les titres, Open Sans pour le contenu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS personnalisé compilé depuis SCSS -->
    <link rel="stylesheet" href="../css/custom.css">

    <title>CEPI - Connexion</title>
</head>
<body class="bg-dark text-white">

    <!-- DIV ROOT pour le Header React -->
    <div id="header-root"></div>

    <!-- CONTENU PRINCIPAL - FORMULAIRE DE CONNEXION -->
    <div class="container my-5 px-3">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-6 col-lg-4">

                <!-- CARTE DE CONNEXION -->
                <div class="card shadow p-4">

                    <!-- Icône utilisateur en haut -->
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle fs-1 text-secondary" style="font-size: 5rem;"></i>
                    </div>

                    <!-- FORMULAIRE -->
                    <form>
                        <!-- Champ Email/Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Username or Email</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter username or email">
                        </div>

                        <!-- Champ Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter password">
                        </div>

                        <!-- Checkbox Remember Me -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>

                        <!-- Bouton de connexion -->
                        <button type="submit" class="btn btn-dark w-100 mb-3">Login</button>

                        <!-- Lien mot de passe oublié -->
                        <div class="text-center">
                            <small><a href="#" class="text-decoration-none">Forgot password?</a></small>
                        </div>
                    </form>

                    <!-- Séparateur -->
                    <hr class="my-4">

                    <!-- Bouton Sign Up -->
                    <button type="button" class="btn btn-outline-dark w-100">Sign Up</button>
                </div>

            </div>
        </div>
    </div>

    <!-- DIV ROOT pour le Footer React -->
    <div id="footer-root"></div>

    <!-- Bootstrap JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 1. React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- 2. React-dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 3. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Composants React -->
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>

    <!-- Initialisation des composants React -->
    <script type="text/babel">
        const headerRoot = ReactDOM.createRoot(document.getElementById('header-root'));
        headerRoot.render(<Header />);

        const footerRoot = ReactDOM.createRoot(document.getElementById('footer-root'));
        footerRoot.render(<Footer />);
    </script>
</body>
</html>
