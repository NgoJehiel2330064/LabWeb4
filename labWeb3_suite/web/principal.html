<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CSS : Framework CSS pour le style et le responsive -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    
    <!-- Bootstrap Icons : Bibliothèque d'icônes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Google Fonts : Lora pour les titres, Open Sans pour le contenu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS personnalisé compilé depuis SCSS -->
    <link rel="stylesheet" href="../css/custom.css">
    
    <title>CEPI - Blog</title>
</head>
<body class="bg-dark text-white">

    <!-- ============================================================ -->
    <!-- DIV ROOT - Point d'entrée de React                          -->
    <!-- Le composant Header sera rendu ici par React                -->
    <!-- ============================================================ -->
    <div id="header-root"></div>

    <!-- BARRE DE RECHERCHE ET FILTRE -->
    <!-- container : Conteneur avec largeur max et centré -->
    <!-- my-4 : Margin vertical niveau 4 -->
    <div class="container my-4 bg-dark">
        <!-- row : Ligne du système de grille Bootstrap -->
        <!-- align-items-center : Aligne les éléments verticalement au centre -->
        <!-- g-3 : Gap niveau 3 entre les colonnes (pour le responsive) -->
        <div class="row align-items-center g-3">
            <!-- col-12 col-md-5 : Sur mobile prend 12 col (pleine largeur), sur tablette+ prend 5 col -->
            <div class="col-12 col-md-5">
                <!-- input-group : Groupe d'input Bootstrap -->
                <div class="input-group">
                    <!-- Icône de recherche -->
                    <span class="input-group-text bg-white">
                        <i class="bi bi-search"></i>
                    </span>
                    <!-- form-control : Classe Bootstrap pour inputs -->
                    <input type="text" class="form-control" placeholder="Rechercher...">
                </div>
            </div>
            
            <!-- col-12 col-md-2 : Sur mobile prend 12 col, sur tablette+ prend 2 col -->
            <!-- text-center : Centre le texte -->
            <!-- text-md-center : Centre sur tablette et plus -->
            <div class="col-12 col-md-2 text-center text-md-center">
                <span>Trier par:</span>
            </div>
            
            <!-- col-12 col-md-3 : Sur mobile prend 12 col, sur tablette+ prend 3 col -->
            <div class="col-12 col-md-3">
                <!-- form-select : Classe Bootstrap pour select -->
                <select class="form-select">
                    <option selected>Select</option>
                    <option value="1">Date</option>
                    <option value="2">Titre</option>
                    <option value="3">Popularité</option>
                </select>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- DIV ROOT pour le composant BlogList                         -->
    <!-- React va afficher la liste des articles ici                 -->
    <!-- ============================================================ -->
    <div id="bloglist-root"></div>

    <!-- ============================================================ -->
    <!-- DIV pour le Footer React                                    -->
    <!-- Le composant Footer sera rendu ici                          -->
    <!-- ============================================================ -->
    <div id="footer-root"></div>
    
    <!-- Bootstrap JavaScript Bundle (inclut Popper pour les menus) -->
    <!-- Nécessaire pour les composants interactifs Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ============================================================ -->
    <!-- REACT - Librairie principale pour créer des composants UI    -->
    <!-- On utilise la version "development" pour avoir des messages  -->
    <!-- d'erreur lisibles pendant le développement                   -->
    <!-- ============================================================ -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <!-- ============================================================ -->
    <!-- REACT-DOM - Permet à React de manipuler le DOM du navigateur -->
    <!-- C'est ce qui fait le lien entre React et la page HTML        -->
    <!-- ============================================================ -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- ============================================================ -->
    <!-- BABEL - Transforme le JSX en JavaScript standard             -->
    <!-- Sans Babel, le navigateur ne comprendrait pas la syntaxe JSX -->
    <!-- (ex: <div className="..."> dans du JS)                       -->
    <!-- ============================================================ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ============================================================ -->
    <!-- INCLUSION DES COMPOSANTS REACT                              -->
    <!-- IMPORTANT : les composants doivent être inclus AVANT        -->
    <!-- le script qui les utilise (ils sont lus de haut en bas)     -->
    <!-- type="text/babel" = Babel va transformer le JSX en JS       -->
    <!-- ============================================================ -->
    <!-- Composants inclus dans l'ordre : les dépendances en premier -->
    <!-- BlogCard doit être chargé AVANT BlogList car BlogList l'utilise -->
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="components/BlogCard.js"></script>
    <script type="text/babel" src="components/BlogList.js"></script>

    <!-- ============================================================ -->
    <!-- INITIALISATION : Monte chaque composant dans sa div root    -->
    <!-- ============================================================ -->
    <script type="text/babel">
        // Monter le Header
        const headerRoot = ReactDOM.createRoot(document.getElementById('header-root'));
        headerRoot.render(<Header />);

        // Monter la liste des articles (charge l'API automatiquement)
        const blogListRoot = ReactDOM.createRoot(document.getElementById('bloglist-root'));
        blogListRoot.render(<BlogList />);

        // Monter le Footer
        const footerRoot = ReactDOM.createRoot(document.getElementById('footer-root'));
        footerRoot.render(<Footer />);
    </script>
</body>
</html>
