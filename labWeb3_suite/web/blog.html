<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Google Fonts : Lora pour les titres, Open Sans pour le contenu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS personnalisé compilé depuis SCSS -->
    <link rel="stylesheet" href="../css/custom.css">

    <title>CEPI-Blog</title>
</head>
<body class="bg-dark text-white">

    <!-- ============================================================ -->
    <!-- DIV ROOT pour le Header React dans blog.html                -->
    <!-- ============================================================ -->
    <div id="header-root"></div>

    <!-- ============================================================ -->
    <!-- DIV ROOT pour le composant Blog (article + commentaires)    -->
    <!-- Contient BlogDetails + CommentList + AddComment              -->
    <!-- ============================================================ -->
    <div id="blog-root"></div>

    <!-- ============================================================ -->
    <!-- DIV ROOT pour le Footer React dans blog.html                -->
    <!-- ============================================================ -->
    <div id="footer-root"></div>
    
    <!-- Bootstrap JavaScript Bundle (inclut Popper pour les menus) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ============================================================ -->
    <!-- REACT - Librairie principale pour créer des composants UI    -->
    <!-- ============================================================ -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <!-- ============================================================ -->
    <!-- REACT-DOM - Fait le lien entre React et le DOM HTML         -->
    <!-- ============================================================ -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- ============================================================ -->
    <!-- BABEL - Transforme le JSX en JavaScript compréhensible       -->
    <!-- par le navigateur                                            -->
    <!-- ============================================================ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ============================================================ -->
    <!-- INCLUSION DES COMPOSANTS REACT                              -->
    <!-- Les composants doivent être inclus avant le script          -->
    <!-- qui les utilise                                             -->
    <!-- ============================================================ -->
    <!-- Composants dans l'ordre des dépendances : -->
    <!-- Comment doit être avant CommentList (CommentList l'utilise) -->
    <!-- BlogDetails, CommentList, AddComment avant Blog (Blog les utilise) -->
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="components/BlogDetails.js"></script>
    <script type="text/babel" src="components/Comment.js"></script>
    <script type="text/babel" src="components/CommentList.js"></script>
    <script type="text/babel" src="components/AddComment.js"></script>
    <script type="text/babel" src="components/Blog.js"></script>

    <!-- ============================================================ -->
    <!-- INITIALISATION : Monte tous les composants dans leurs roots  -->
    <!-- ============================================================ -->
    <script type="text/babel">
        // Monter le Header
        const headerRoot = ReactDOM.createRoot(document.getElementById('header-root'));
        headerRoot.render(<Header />);

        // Monter le composant Blog principal
        // (qui contient BlogDetails + CommentList + AddComment)
        const blogRoot = ReactDOM.createRoot(document.getElementById('blog-root'));
        blogRoot.render(<Blog />);

        // Monter le Footer
        const footerRoot = ReactDOM.createRoot(document.getElementById('footer-root'));
        footerRoot.render(<Footer />);
    </script>
</body>
</html>
