<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEPI - Formulaire</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Google Fonts : Lora pour les titres, Open Sans pour le contenu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS personnalisé compilé depuis SCSS -->
    <link rel="stylesheet" href="../css/custom.css">
</head>
<body class="bg-dark text-white">

    <!-- DIV ROOT pour le Header React -->
    <div id="header-root"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <h1 class="mb-4 text-center">Formulaire</h1>
                <form id="form-publication" class="p-4 border rounded shadow-sm bg-dark border-secondary">

                    <div class="mb-3">
                        <label for="titre" class="form-label">Titre</label>
                        <input type="text" class="form-control" id="titre" required name="titre">
                    </div>
                    <div class="mb-3">
                        <label for="auteur" class="form-label">Auteur</label>
                        <input type="text" class="form-control" id="auteur" required name="auteur">
                    </div>
                    <div class="mb-3">
                        <label for="contenu" class="form-label">Contenu</label>
                        <textarea class="form-control" id="contenu" rows="3" required name="contenu"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="text" class="form-control" id="datepicker" required name="date">
                    </div>
                    <button type="submit" class="btn btn-primary">Publier</button>
                    <div id="dialog" title="Basic dialog" style="display:none;">
                        <p>Confirmer la publication du formulaire ?</p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- DIV ROOT pour le Footer React -->
    <div id="footer-root"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 1. React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- 2. React-dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 3. Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Composants React -->
    <script type="text/babel" src="components/Header.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>

    <!-- Initialisation des composants React -->
    <script type="text/babel">
        const headerRoot = ReactDOM.createRoot(document.getElementById('header-root'));
        headerRoot.render(<Header />);

        const footerRoot = ReactDOM.createRoot(document.getElementById('footer-root'));
        footerRoot.render(<Footer />);
    </script>

    <script src="../dist/form.js"></script>
</body>
</html>
